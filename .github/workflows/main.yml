name: Build HayaPOS APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Install Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-7.5/bin" >> $GITHUB_PATH
 
      - name: Create Project Files
        run: |
          echo "" | base64 -d > /tmp/setup.py
          python3 /tmp/setup.py
 
      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir .
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HayaPOS-APK
          path: app/build/outputs/apk/debug/*.apk
