          python3 -c "
import struct,zlib,math
def png(s):
    w=h=s;cx=cy=s//2;rows=[]
    for y in range(h):
        row=[0]
        for x in range(w):
            d=math.sqrt((x-cx)**2+(y-cy)**2);r2=s*0.4
            if d<r2:
                t=d/r2;row+=[int(112*t),int(112-50*t),int(242-100*t),255]
            else:row+=[28,35,51,255]
        rows.append(bytes(row))
    def ck(t,d):
        c=t.encode()+d
        return struct.pack('>I',len(d))+c+struct.pack('>I',zlib.crc32(c)&0xffffffff)
    raw=b''.join(rows)
    p=b'\x89PNG\r\n\x1a\n'
    p+=ck('IHDR',struct.pack('>IIBBBBB',w,h,8,6,0,0,0))
    p+=ck('IDAT',zlib.compress(raw))
    p+=ck('IEND',b'')
    return p
for nm,sz in [('mdpi',48),('hdpi',72),('xhdpi',96),('xxhdpi',144),('xxxhdpi',192)]:
    open(f'app/src/main/res/mipmap-{nm}/ic_launcher.png','wb').write(png(sz))
"

      - name: Build APK
        run: |
          export ANDROID_HOME=/opt/android-sdk-linux
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HayaPOS-APK
          path: app/build/outputs/apk/debug/*.apk
