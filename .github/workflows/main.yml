name: Build HayaPOS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest

    steps:
      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/haya/pos
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'SETTINGS'
rootProject.name = "HayaPOS"
include ':app'
SETTINGS

          cat > build.gradle << 'BG'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
}
allprojects { repositories { google(); mavenCentral() } }
BG

          cat > gradle.properties << 'GP'
android.useAndroidX=true
android.enableJetifier=true
GP

          cat > gradle/wrapper/gradle-wrapper.properties << 'GWP'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
GWP

          cat > gradlew << 'GW'
#!/bin/sh
exec gradle-7.5 "$@" 2>/dev/null || exec /opt/gradle/gradle-7.5/bin/gradle "$@"
GW
          chmod +x gradlew

          cat > app/build.gradle << 'ABG'
plugins { id 'com.android.application' }
android {
    namespace 'com.haya.pos'
    compileSdk 33
    defaultConfig {
        applicationId "com.haya.pos"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    buildTypes { debug { minifyEnabled false } }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
}
ABG

          cat > app/src/main/AndroidManifest.xml << 'AM'
