name: Build HayaPOS APK

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-7.5/bin" >> $GITHUB_PATH

      - name: Create Android Project
        run: |

          mkdir -p app/src/main/java/com/haya/pos
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'EOF'
          rootProject.name = "HayaPOS"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }

              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {

              namespace 'com.haya.pos'

              compileSdk 33

              defaultConfig {

                  applicationId "com.haya.pos"

                  minSdk 26
                  targetSdk 33

                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {

                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
          }

          dependencies {

              implementation 'androidx.appcompat:appcompat:1.7.0'

              implementation 'androidx.webkit:webkit:1.11.0'

              implementation 'androidx.core:core:1.13.1'

              implementation 'com.github.DantSu:ESCPOS-ThermalPrinter-Android:3.3.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET"/>

              <uses-permission android:name="android.permission.BLUETOOTH"/>

              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>

              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>

              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>

              <application
                  android:allowBackup="true"
                  android:label="Haya POS"
                  android:theme="@style/Theme.AppCompat.NoActionBar">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">

                      <intent-filter>

                          <action android:name=
                              "android.intent.action.MAIN"/>

                          <category android:name=
                              "android.intent.category.LAUNCHER"/>

                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > app/src/main/java/com/haya/pos/MainActivity.java << 'EOF'
          package com.haya.pos;

          import android.Manifest;
          import android.annotation.SuppressLint;
          import android.bluetooth.BluetoothAdapter;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;

          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          import com.dantsu.escposprinter.EscPosPrinter;
          import com.dantsu.escposprinter.connection.bluetooth.BluetoothConnection;
          import com.dantsu.escposprinter.connection.bluetooth.BluetoothPrintersConnections;

          public class MainActivity extends AppCompatActivity {

              private WebView webView;

              private static final int REQ = 100;

              @SuppressLint({"SetJavaScriptEnabled","JavascriptInterface"})
              @Override
              protected void onCreate(Bundle savedInstanceState) {

                  super.onCreate(savedInstanceState);

                  askPermissions();

                  webView = new WebView(this);

                  setContentView(webView);

                  WebSettings s = webView.getSettings();

                  s.setJavaScriptEnabled(true);

                  s.setDomStorageEnabled(true);

                  webView.setWebChromeClient(
                      new WebChromeClient()
                  );

                  webView.setWebViewClient(
                      new WebViewClient()
                  );

                  webView.addJavascriptInterface(
                      new PrinterBridge(),
                      "AndroidPrinter"
                  );

                  webView.loadUrl(
                      "https://YOUR-WEBSITE.com"
                  );
              }

              private void askPermissions() {

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S) {

                      ActivityCompat.requestPermissions(
                          this,
                          new String[]{
                              Manifest.permission.BLUETOOTH_CONNECT,
                              Manifest.permission.BLUETOOTH_SCAN
                          },
                          REQ
                      );
                  }
              }

              public class PrinterBridge {

                  @JavascriptInterface
                  public void printReceipt(String text) {

                      try {

                          if (Build.VERSION.SDK_INT >=
                              Build.VERSION_CODES.S) {

                              if (ContextCompat.checkSelfPermission(
                                  MainActivity.this,
                                  Manifest.permission.BLUETOOTH_CONNECT
                              ) != PackageManager.PERMISSION_GRANTED) {

                                  return;
                              }
                          }

                          BluetoothConnection printer =
                              BluetoothPrintersConnections
                                  .selectFirstPaired();

                          if (printer == null) {

                              runOnUiThread(() ->
                                  Toast.makeText(
                                      MainActivity.this,
                                      "لا يوجد طابعة مقترنة",
                                      Toast.LENGTH_LONG
                                  ).show()
                              );

                              return;
                          }

                          EscPosPrinter p =
                              new EscPosPrinter(
                                  printer,
                                  203,
                                  48f,
                                  32
                              );

                          p.printFormattedText(
                              "[C]<b>HAYA POS</b>\n" +
                              "[L]\n" +
                              text +
                              "\n[C]شكراً لزيارتكم\n\n"
                          );

                      } catch (Exception e) {

                          runOnUiThread(() ->
                              Toast.makeText(
                                  MainActivity.this,
                                  e.getMessage(),
                                  Toast.LENGTH_LONG
                              ).show()
                          );
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HayaPOS-APK
          path: app/build/outputs/apk/debug/*.apk
